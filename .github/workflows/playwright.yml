on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Nombre del archivo de test (vacío para todos)'
        required: false
        default: ''
      grep_filter:
        description: 'Filtrar por nombre de test (grep)'
        required: false
        default: ''

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      # Usamos las variables que el usuario escribe en el botón
      run: npx playwright test ${{ github.event.inputs.test_file }} --grep "${{ github.event.inputs.grep_filter }}"
      
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30