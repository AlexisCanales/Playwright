name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  
    # Agrega los textbox en GitHub Actions para ejecutar manualmente
  workflow_dispatch:
    inputs:
      #para textbox de busqueda de test
      #test_file:
        #description: 'Nombre del archivo de test (ej: tests/testDemoQA3.spec.js)'
        #required: false
        #default: ''
      #grep_filter:
        #description: 'Filtrar por nombre de test (grep)'
        #required: false
        #default: ''

      #para combobox de seleccion de test
      test_file:
        description: 'Selecciona el archivo de test a ejecutar'
        required: true
        type: choice
        options:
          - all
          - tests/testDemoQA3.spec.js
          - tests/combobox.spec.js
          - tests/slider.spec.js
        default: all
      grep_filter:
        description: 'Filtrar por nombre de test (grep)'
        required: false
        default: ''
 




# Forzamos el uso de Node 24 para evitar los mensajes de "deprecated"
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        # Cambiado a 24 para cumplir con las nuevas políticas de GitHub
        node-version: '24'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      # IMPORTANTE: Agregamos --project=chromium-hidden para que GitHub no intente abrir la ventana
      run: npx playwright test ${{ github.event.inputs.test_file }} --grep "${{ github.event.inputs.grep_filter }}" --project=chromium-hidden
      
    # Bloque adicional para subir reportes de Playwright a github actions
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    
    # Bloque adicional para subir los screenshots a github actions
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: screenshots
        path: screenshots/
        retention-days: 30